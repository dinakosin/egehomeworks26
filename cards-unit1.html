<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Unit 1: You and I — Flashcards</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root{
    --bg:#0f1226; --bg2:#1a1f3d; --accent:#6c8cff; --accent2:#8b5cf6;
    --good:#34d399; --card:#ffffff; --txt:#1f2233;
  }
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:linear-gradient(160deg,var(--bg),var(--bg2));
    color:#fff; min-height:100vh;
    display:flex; flex-direction:column; align-items:center;
    padding:14px; overflow-x:hidden;
  }
  .wrap{width:100%; max-width:460px; display:flex; flex-direction:column; gap:12px;}

  header h1{
    font-size:2.1rem; margin:4px 0 0; text-align:left; font-weight:700;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  header p{ margin:2px 0; text-align:left; font-size:.78rem; color:#aab1d6;}

  /* Progress */
  .progress-outer{
    width:100%; height:12px; background:rgba(255,255,255,.12);
    border-radius:20px; overflow:hidden;   margin-bottom:10px; 
  }
  .progress-inner{
    height:100%; width:4%;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    border-radius:20px; transition:width .4s ease;
  }
  .counter{ text-align:left; font-size:.82rem; color:#cbd2f5; font-weight:600;  margin-bottom:24px; }

  /* Card */
  .scene{
    width:100%; height:340px; perspective:1200px; margin-top:4px;
  }
  .card{
    width:100%; height:100%; position:relative;
    transform-style:preserve-3d; transition:transform .5s;
    cursor:pointer;
  }
  .card.flipped{ transform:rotateY(180deg); }
  .face{
    position:absolute; inset:0; backface-visibility:hidden;
    border-radius:22px; padding:22px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; gap:14px; box-shadow:0 18px 40px rgba(0,0,0,.45);
  }
  .front{ background:var(--card); color:var(--txt); }
  .back{
    background:linear-gradient(160deg,#6c8cff,#8b5cf6); color:#fff;
    transform:rotateY(180deg);
  }
  .emoji{ font-size:3.4rem; line-height:1; }
  .translation{ font-size:1.4rem; font-weight:700; }
  .example{ font-size:1rem; color:#555; font-style:italic; line-height:1.4;}
  .back .word{ font-size:2rem; font-weight:800; letter-spacing:.5px; }
  .blank{ display:inline-block; min-width:60px; }
  .qlabel{ font-size:.72rem; text-transform:uppercase; letter-spacing:1px; opacity:.6; }
  .question{ font-size:1.25rem; font-weight:700; line-height:1.4; }
  .answer{ font-size:1.5rem; font-weight:800; }
  .tap-hint{ font-size:.7rem; opacity:.45; margin-top:6px; }
  .motivation{ background:linear-gradient(160deg,#34d399,#059669)!important; color:#fff; }
  .motivation .emoji{ font-size:4rem; }
  .motivation .translation{ font-size:1.4rem; }

  /* Controls */
  .controls{ display:flex; gap:10px; justify-content:center; margin-top:24px;}
  button{
    flex:1; border:none; border-radius:14px; padding:13px 8px;
    font-size:.92rem; font-weight:700; cursor:pointer; color:#fff;
    background:rgba(255,255,255,.12); transition:transform .1s, background .2s;
  }
  button:active{ transform:scale(.95); }
  button.primary{ background:linear-gradient(90deg,var(--accent),var(--accent2)); }
  button.shuffle{ background:rgba(255,255,255,.16); }

  /* Review screen */
  .review{ display:none; flex-direction:column; gap:14px; }
  .review h2{ text-align:right; font-size:1rem; margin:0; }
  .review p{ text-align:right; font-size:.82rem; color:#aab1d6; margin:0; }
  .grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .mini{
    background:var(--card); color:var(--txt); border-radius:14px; padding:14px 8px;
    text-align:center; min-height:92px; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:6px; cursor:pointer;
    border:3px solid transparent; transition:.15s;
  }
  .mini{
    min-height:110px;        /* чуть выше, чтобы влезал текст */
    padding:10px 6px;
  }
  .mini .me{ font-size:1.5rem; }
  .mini .mw{
    font-size:.7rem;          /* мельче текст */
    font-weight:700;
    line-height:1.15;
    word-break:break-word;
    hyphens:auto;
    overflow:hidden;
  }
  .mini.selected{ border-color:#ef4444; transform:scale(.97); background:#ffe8e8; }

  /* Final */
  .final{ display:none; text-align:center; padding:30px 10px; }
  .final .big{ font-size:3.5rem; }
  .final h2{ font-size:1.4rem; margin:14px 0 6px; }
  .final p{ color:#cbd2f5; font-size:.95rem; }

  .modal-overlay{
  position:fixed; inset:0; background:rgba(0,0,0,.6);
  display:flex; align-items:center; justify-content:center; z-index:1000;
}
.modal-box{
  background:#1e2340; color:#fff; padding:24px; border-radius:16px;
  width:90%; max-width:480px; box-shadow:0 10px 40px rgba(0,0,0,.5);
}
.modal-box h3{ margin:0 0 14px; }
#hardText{
  width:100%; height:200px; resize:vertical; border-radius:10px;
  padding:10px; font-size:.9rem; border:none; background:#11142a; color:#cbd2f5;
}
.modal-btns{ display:flex; gap:10px; flex-wrap:wrap; margin-top:14px; }
.modal-btns button{
  flex:1; padding:10px; border-radius:10px; border:none;
  cursor:pointer; font-weight:600; min-width:120px;
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Unit 1: You and I</h1>
    <p>Подготовка к тесту · Флешкарты</p>
  </header>

  <!-- STUDY -->
  <div id="study">
    <div class="progress-outer"><div class="progress-inner" id="bar"></div></div>
    <div class="counter">Осталось повторить: <span id="counter">1/50</span></div>

    <div class="scene">
      <div class="card" id="card" onclick="flip()">
        <div class="face front" id="front"></div>
        <div class="face back" id="back"></div>
      </div>
    </div>

    <div class="controls">
      <button class="shuffle" onclick="shuffleDeck()">🔀 Перемешать</button>
      <button onclick="prevCard()">← Назад</button>
      <button class="primary" onclick="nextCard()">Дальше →</button>
    </div>
  </div>

  <!-- REVIEW -->
  <div class="review" id="review">
    <h2>Отметь сложные карточки</h2>
    <p>Нажми на те слова, которые запомнились плохо. Сет <span id="setNum">1</span></p>
    <div class="grid" id="grid"></div>
    <div class="controls">
      <button class="primary" onclick="iKnowAll()">✅ Помню все</button>
      <button onclick="nextReviewSet()">Дальше →</button>
    </div>
  </div>

  <!-- FINAL -->
  <div class="final" id="final">
    <div class="big">🎉</div>
    <h2>Отличная работа!</h2>
    <p id="finalMsg"></p>
    <div class="controls" style="margin-top:20px;">
      <button class="primary" onclick="restart()">🔁 Начать заново</button>
    </div>
  </div>
</div>

  {type:'word', emoji:'📛', tr:'Меня зовут ...', word:'My name is ...', ex:'_____ Anna.'},

const motivations = [
  {emoji:'🔥', text:'15 карточек позади! Ты молодец, продолжай!'},
  {emoji:'🚀', text:'30 карточек! Super!'},
  {emoji:'💪', text:'40 карточек! Уже больше половины — отличный темп!'},
  {emoji:'🏆', text:'60 карточек! Ты знаешь больше с каждой карточкой!'},
  {emoji:'🚀', text:'75 карточек! Финишная прямая, ты почти у цели!'}
];
const motivAfter = [15,30,40,60,75]; // после какой карточки показать

/* ============ STATE ============ */
let deck = [];
let idx = 0;
let isFlipped = false;
let flipTime = 0;       // когда показали лицевую
let viewTimerStart = 0;
let autoTimer = null;
let hardCards = [];     // отмеченные сложные
let reviewSets = [];
let curReviewSet = 0;

const front = document.getElementById('front');
const back  = document.getElementById('back');
const cardEl= document.getElementById('card');
const bar   = document.getElementById('bar');
const counterEl = document.getElementById('counter');

/* ============ INIT ============ */
function buildDeck(){
  // вставляем мотивационные карточки в нужные позиции
  let d = baseCards.map((c,i)=>({...c, _orig:i, longViewed:false}));
  return d;
}

function init(){
  deck = buildDeck();
  idx = 0; hardCards=[]; isFlipped=false;
  document.getElementById('study').style.display='block';
  document.getElementById('review').style.display='none';
  document.getElementById('final').style.display='none';
  showCard();
}

/* ============ RENDER ============ */
function renderFace(c){
  if(c.type==='motivation'){
    front.className='face front motivation';
    back.className='face back motivation';
    front.innerHTML = `<div class="emoji">${c.emoji}</div><div class="translation">${c.text}</div><div class="tap-hint">нажми «Дальше»</div>`;
    back.innerHTML = front.innerHTML;
    return;
  }
  front.className='face front';
  back.className='face back';
  if(c.type==='word'){
    const ex = c.ex.replace('_____', '<span class="blank">_____</span>');
    front.innerHTML = `
      <div class="emoji">${c.emoji}</div>
      <div class="translation">${c.tr}</div>
      <div class="example">${ex}</div>
      <div class="tap-hint"></div>`;
    back.innerHTML = `
      <div class="emoji">${c.emoji}</div>
      <div class="word">${c.word}</div>`;
  } else { // grammar
    front.innerHTML = `
      <div class="qlabel">грамматика</div>
      <div class="emoji">${c.emoji}</div>
      <div class="question">${c.q}</div>
      <div class="tap-hint">нажми, чтобы увидеть ответ</div>`;
    back.innerHTML = `
      <div class="qlabel"></div>
      <div class="emoji">✅</div>
      <div class="answer">${c.a}</div>`;
  }
}

function showCard(){
  if(idx >= deck.length){ startReview(); return; }
  clearTimeout(autoTimer);
  isFlipped=false;
  cardEl.classList.remove('flipped');
  const c = deck[idx];
  renderFace(c);

  // counter & progress
  const total = deck.length;
  counterEl.textContent = `${idx+1}/${total}`;
  let pct = Math.max(4, Math.round(((idx)/total)*100));
  if(idx===0) pct=4;
  bar.style.width = pct + '%';

  viewTimerStart = Date.now();
}

/* ============ FLIP / NAV ============ */
function flip(){
  const c = deck[idx];
  if(c.type==='motivation') return;
  if(!isFlipped){
    // считаем, сколько смотрел на лицевую сторону
    const elapsed = (Date.now()-viewTimerStart)/1000;
    if(elapsed > 15 && !c._reinserted){
      // показать ещё раз через 5 карточек
      c._reinserted = true;
      const insertPos = Math.min(idx+5, deck.length);
      deck.splice(insertPos, 0, {...c, _reinserted:true});
    }
    isFlipped=true;
    cardEl.classList.add('flipped');
    // авто-переход через 30 сек
    clearTimeout(autoTimer);
    autoTimer = setTimeout(()=> nextCard(), 30000);
  } else {
    isFlipped=false;
    cardEl.classList.remove('flipped');
    clearTimeout(autoTimer);
  }
}

function nextCard(){
  clearTimeout(autoTimer);
  idx++;
  if(idx >= deck.length){ startReview(); return; }
  showCard();
}

function prevCard(){
  clearTimeout(autoTimer);
  if(idx>0){ idx--; showCard(); }
}

function shuffleDeck(){
  clearTimeout(autoTimer);
  const rest = deck.slice(idx); // перемешиваем оставшиеся
  for(let i=rest.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [rest[i],rest[j]]=[rest[j],rest[i]];
  }
  deck = deck.slice(0,idx).concat(rest);
  showCard();
}

/* вставляем мотивационные карточки на лету по достижению позиций */
const motivShown = {};
const _origNext = nextCard;
nextCard = function(){
  // проверяем, надо ли вставить мотивацию
  for(let k=0;k<motivAfter.length;k++){
    const pos = motivAfter[k];
    if(!motivShown[pos] && (idx+1)===pos && pos<deck.length){
      motivShown[pos]=true;
      deck.splice(idx+1,0,{type:'motivation', emoji:motivations[k].emoji, text:motivations[k].text});
    }
  }
  _origNext();
};

/* ============ REVIEW (sets of 8) ============ */
function startReview(){
  document.getElementById('study').style.display='none';
  bar.style.width='100%';
  // собираем только обычные карточки (без мотивации, без дублей)
  const seen = new Set();
  const all = deck.filter(c=>{
    if(c.type==='motivation') return false;
    const key = c.word||c.q;
    if(seen.has(key)) return false;
    seen.add(key); return true;
  });
  // разбиваем по 8
  reviewSets=[];
  for(let i=0;i<all.length;i+=8) reviewSets.push(all.slice(i,i+8));
  curReviewSet=0;
  document.getElementById('review').style.display='flex';
  renderReviewSet();
}

function renderReviewSet(){
  if(curReviewSet>=reviewSets.length){ finish(); return; }
  document.getElementById('setNum').textContent = (curReviewSet+1)+'/'+reviewSets.length;
  const grid = document.getElementById('grid');
  grid.innerHTML='';
  reviewSets[curReviewSet].forEach((c)=>{
    const div=document.createElement('div');
    div.className='mini';
    const label = c.type==='word' ? c.word : c.q;
    div.innerHTML=`<div class="me">${c.emoji}</div><div class="mw">${label}</div>`;
    div.onclick=()=>{
      div.classList.toggle('selected');
      const key=c.word||c.q;
      if(div.classList.contains('selected')) hardCards.push(key);
      else hardCards=hardCards.filter(h=>h!==key);
    };
    grid.appendChild(div);
  });
}

function nextReviewSet(){
  curReviewSet++;
  renderReviewSet();
}
function iKnowAll(){
  // ничего не помечаем в этом сете -> просто дальше
  nextReviewSet();
}

/* ============ FINAL ============ */
function finish(){
  document.getElementById('review').style.display='none';
  const f=document.getElementById('final');
  f.style.display='block';
  const uniqueHard = [...new Set(hardCards)];
  let msg;
  if(uniqueHard.length===0){
    msg = 'Ты не отметил ни одной сложной карточки — значит, ты отлично всё запомнил! Ты готов к тесту по Unit 1! 🌟';
  } else {
    msg = `Ты отметил ${uniqueHard.length} сложн${uniqueHard.length===1?'ую карточку':'ых карточек'}. Повтори их ещё раз перед тестом — и успех гарантирован! Ты справишься! 💪`;
    // показываем pop-up со списком сложных карточек
    showHardModal(uniqueHard);
  }
  document.getElementById('finalMsg').textContent = msg;
}


/* ============ START ============ */
init();
</script>

  <div class="modal-box">
    <h3>Сложные карточки</h3>
    <textarea id="hardText" readonly></textarea>
    <div class="modal-btns">
      <button id="copyHard">📋 Скопировать</button>
      <button id="repeatHard">🔁 Повторить только сложные</button>
      <button id="closeModal">Закрыть</button>
    </div>
  </div>
</div>
